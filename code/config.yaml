# =========================================================================
# Multi-Modal Evidence Review — runtime configuration
# =========================================================================
# Everything that affects cost, latency, or model choice lives here so the
# pipeline can be re-tuned without touching code.

models:
  # Both stages run on gemini-3.1-flash-lite: on the free tier it has by far the
  # highest daily budget (500 RPD vs ~20 for the 2.5/3.x Flash tiers) and 15 RPM
  # / 250K TPM, so the full two-stage pipeline (≈2 calls/claim) fits comfortably.
  # Stage 1 is the cheap validity gate; Stage 2 is the full analysis.
  stage1: "gemini-3.1-flash-lite"
  # Bump Stage 2 to a stronger model (e.g. gemini-3.5-flash or gemini-2.5-pro)
  # only if the sample-set accuracy demands it AND you have the quota for it.
  stage2: "gemini-3.1-flash-lite"

generation:
  # Deterministic outputs make evaluation reproducible and caching effective.
  temperature: 0.0
  # We force JSON so parsing is reliable.
  response_mime_type: "application/json"
  stage1_max_output_tokens: 512
  stage2_max_output_tokens: 1024

# ---- Pricing (USD per 1,000,000 tokens). Defaults sourced June 2026; ----
# ---- override here if Google changes pricing. Used only by the cost  ----
# ---- estimator in the operational report, never by the pipeline.     ----
pricing:
  # Placeholder for gemini-3.1-flash-lite (flash-lite class). Update with the
  # real published rate before quoting cost; used only by the report estimator.
  gemini-3.1-flash-lite:
    input_per_mtok: 0.10
    output_per_mtok: 0.40
  gemini-2.5-flash-lite:
    input_per_mtok: 0.10
    output_per_mtok: 0.40
  gemini-2.5-flash:
    input_per_mtok: 0.30
    output_per_mtok: 2.50
  gemini-2.5-pro:
    input_per_mtok: 1.25
    output_per_mtok: 10.00
  # Approx tokens Gemini bills per image. A small/standard image bills ~258
  # tokens; larger images are tiled. We use a conservative single-tile value
  # and surface it as an assumption in the report.
  tokens_per_image: 258

# ---- Concurrency / rate-limit safety -------------------------------------
runtime:
  # Free tier: keep this low. The per-model rate limiter below is what actually
  # governs throughput, so 1-2 workers is plenty. Raise on a paid tier.
  max_workers: 2            # parallel claims in flight
  max_images_per_claim: 4   # hard cap to bound cost/tokens on pathological rows
  # Downscale long edge before upload. 768px keeps each image to a single
  # Gemini image tile (~258 tokens) instead of being tiled into several, which
  # roughly halves image-token usage vs. 1024px — negligible loss for damage.
  image_max_long_edge_px: 768
  # Stage-1 short-circuit: if the gate is confident the image is unusable, skip
  # Stage 2 entirely (saves the expensive call on junk submissions).
  short_circuit_on_invalid: true
  # Skip the Stage-1 gate entirely and run only the analysis call. This ~halves
  # the number of model calls — useful when quota is tight — at the cost of the
  # cheap quality/authenticity gate. Quality flags then come from Stage 2 only.
  single_stage: false
  # Multi-claim batching: pack this many SAME-object claims into one model call.
  # >1 trades scarce free-tier requests/day for abundant tokens/min — e.g. 44
  # claims at batch_size 4 is ~12 requests instead of 44+. Set 1 to disable.
  # (Batched mode is analysis-only; the Stage-1 gate is implicitly skipped.)
  batch_size: 1
  # Per-model minimum seconds between requests, enforced across all workers.
  # 4.5s ~= 13 requests/min, under the 15 RPM cap for gemini-3.1-flash-lite.
  # Both stages share this one model pool, so all calls are spaced against each
  # other. Lower it (or set 0) on a paid tier for full speed.
  min_request_interval_s: 4.5

cache:
  enabled: true
  dir: ".cache"             # keyed on (model, prompt_hash, image_hash)

retry:
  max_attempts: 5
  initial_backoff_s: 2.0
  max_backoff_s: 60.0
